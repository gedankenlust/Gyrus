<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1d1d1f;
      --secondary: #8e8e93;
      --accent: #007aff;
      --success: #34c759;
      --error: #ff3b30;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --text: #f5f5f7;
        --secondary: #8e8e93;
        --accent: #0a84ff;
      }
    }
    body {
      width: 250px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    .success { color: var(--success); }
    .error { color: var(--error); }
    .loading { color: var(--accent); }
    .details {
      margin-top: 10px;
      font-size: 12px;
      color: var(--secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="status loading" id="status-container">
      <span id="status-icon">⏳</span>
      <span id="status-text">Speichere in Gyrus...</span>
    </div>
    <div class="details" id="page-title">...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
